<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>운영 화면 | 브랜드 아틀라스</title><meta name="description" content="브랜드 데이터 검색과 운영 검수를 위한 화면입니다."><meta name="robots" content="index,follow"><meta property="og:type" content="website"><meta property="og:title" content="운영 화면 | 브랜드 아틀라스"><meta property="og:description" content="브랜드 데이터 검색과 운영 검수를 위한 화면입니다."><meta property="og:url" content="https://brand.resort.co.kr/pages/other-pages.html"><meta property="og:image" content="https://brand.resort.co.kr/assets/objects/search_result_panel.png"><meta name="twitter:card" content="summary_large_image"><link rel="icon" href="../assets/objects/brand_atlas_logo_mark.png"><link rel="canonical" href="https://brand.resort.co.kr/pages/other-pages.html"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css?v=20260531a"></head>
<body><a href="#main-content" class="skip-nav">본문 바로가기</a><div id="head"></div><main id="main-content" class="wrap"><section class="page-title"><div><p class="kicker">SEARCH / BI-CI / ADMIN</p><h1>운영 화면</h1><p class="lead">통합 검색, BI/CI 타임라인, 운영자 검수 화면을 실제 데이터 구조에 맞춰 구성한 페이지입니다.</p></div></section>
<section class="other-grid">
  <article class="mock-panel" id="search"><h2><span>01</span>통합 검색 결과</h2><div class="search"><input id="query" placeholder="예: 공간, 디자인, 스타벅스, 모빌리티"><button aria-label="검색">⌕</button></div><div class="result-list" id="results"></div></article>
  <div>
    <article class="mock-panel" id="timeline"><h2><span>02</span>브랜드 타임라인</h2><div class="bici-list" id="timelineList"></div></article>
    <article class="mock-panel" id="bici" style="margin-top:28px"><h2><span>03</span>BI/CI 타임라인</h2><div class="bici-list" id="biciList"></div></article>
    <article class="mock-panel" id="insights" style="margin-top:28px"><h2><span>04</span>브랜드 인사이트</h2><div class="insight-list vertical" id="insightList"></div></article>
    <article class="mock-panel" id="admin" style="margin-top:28px"><h2><span>05</span>운영자 관리자</h2><div class="admin-list" id="adminList"></div></article>
  </div>
</section></main><script src="../app.js?v=20260531b" defer></script><script>document.addEventListener("DOMContentLoaded", () => {
document.getElementById("head").innerHTML = header("검색");
loadData().then(d => {
  const allBrands = d.allBrands || d.brands;
  const renderResults = q => {
    const query = (q || "").trim();
    const rows = searchBrands(allBrands, query, 12);
    document.getElementById("results").innerHTML = rows.map(b => `<a class="result-item" href="brand-artemio.html?brand=${b.slug}"><img src="${asset(b.image)}" alt="${b.name}"><div><b>${b.name}</b><p>${b.industry} · ${tierLabel(b.tier)}</p><small>${short(b.definition, 120)}</small></div></a>`).join("");
  };
  const initialQuery = new URLSearchParams(location.hash.split("?")[1] || location.search).get("q") || "";
  document.getElementById("query").value = initialQuery;
  renderResults(initialQuery);
  document.getElementById("query").addEventListener("input", e => renderResults(e.target.value));
  document.querySelector("#search button").addEventListener("click", () => renderResults(document.getElementById("query").value));
  window.addEventListener("hashchange", () => {
    const q = new URLSearchParams(location.hash.split("?")[1] || "").get("q") || "";
    document.getElementById("query").value = q;
    renderResults(q);
  });
  document.getElementById("timelineList").innerHTML = timelineRail(d.timeline.slice(0,12));
  document.getElementById("biciList").innerHTML = allBrands.filter(b => b.logo).slice(0,6).map(b => `<a class="bici-row" href="brand-artemio.html?brand=${b.slug}"><img src="${asset(b.logo || b.image)}" alt="${b.name} logo"><div><b>${b.name}</b><p>${b.industry} · 로고/이미지 후보 검수</p></div></a>`).join("");
  document.getElementById("insightList").innerHTML = d.insights.slice(0,5).map(insightCard).join("");
  document.getElementById("adminList").innerHTML = d.adminModules.map(m => `<div class="filter-item"><span>${m}</span><span>관리</span></div>`).join("");
});
});</script></body></html>
