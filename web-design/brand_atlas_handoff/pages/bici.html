<body><a href="#main-content" class="skip-nav">본문 바로가기</a><div id="head"></div><main id="main-content" class="wrap"><section class="page-title"><div><p class="kicker">BI/CI ARCHIVE</p><h1>BI/CI 아카이브</h1><p class="lead">확인된 로고와 브랜드 시각 자산을 브랜드 상세 페이지로 연결합니다.</p></div></section><section class="panel"><div class="logo-archive" id="biciList"></div></section></main><script src="../app.js?v=20260604b" defer></script><script>document.addEventListener("DOMContentLoaded", () => {
document.getElementById("head").innerHTML = header("BI/CI 아카이브");
loadData().then(d => {
  const rows = (d.allBrands || d.brands || []).filter(b => b.logo).slice(0, 80);
  document.getElementById("biciList").innerHTML = rows.map(b => `<a class="related-card" href="brand-artemio.html?brand=${encodeURIComponent(b.slug)}"><img src="${asset(b.logo)}" alt="${b.name} 로고" loading="lazy" decoding="async"><span>${b.industry}</span><b>${b.name}</b><p>${tierLabel(b.tier)}</p></a>`).join("");
  enhanceImages(document);
});
});</script></body></html>
