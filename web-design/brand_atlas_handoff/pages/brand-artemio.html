<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>브랜드 매거진 | 브랜드 아틀라스</title><meta name="description" content="브랜드의 역사, 아이덴티티, 제품과 서비스, 인물, 현재 상태, BI/CI 변천사를 한 페이지에서 읽는 브랜드 매거진입니다."><meta name="robots" content="index,follow"><meta property="og:type" content="article"><meta property="og:title" content="브랜드 매거진 | 브랜드 아틀라스"><meta property="og:description" content="브랜드별 미니 매거진과 지식 위키를 연결한 상세 페이지입니다."><meta property="og:image" content="../assets/objects/world_map_dots.png"><meta name="twitter:card" content="summary_large_image"><link rel="icon" href="../assets/objects/brand_atlas_logo_mark.png"><link rel="canonical" href="http://localhost:8765/web-design/brand_atlas_handoff/pages/brand-artemio.html"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css?v=20260521y"></head>
<body><div id="head"></div><main class="wrap" id="brandPage"></main>
<script src="../app.js?v=20260521y"></script><script>
document.getElementById("head").innerHTML = header("브랜드 매거진");
loadData().then(d => {
  window.brandAtlasData = d;
  const params = new URLSearchParams(location.search);
  const slug = params.get("brand") || d.featuredBrand.slug;
  const brand = findBrand(d, slug);
  if (!brand) {
    document.title = "브랜드를 찾을 수 없습니다 | 브랜드 아틀라스";
    document.getElementById("brandPage").innerHTML = renderBrandNotFound(slug, d.allBrands || d.brands || []);
    return;
  }
  applyBrandSeo(brand);
  document.getElementById("brandPage").innerHTML = renderBrandMagazine(brand);
});
</script></body></html>
