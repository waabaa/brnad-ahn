<body><a href="#main-content" class="skip-nav">본문 바로가기</a><div id="head"></div><main id="main-content" class="wrap"><div id="brandPage"><section class="brand-skeleton"><div><p class="kicker">BRAND MAGAZINE</p><h1>브랜드를 불러오는 중</h1><p class="lead">브랜드 사전 데이터를 준비하고 있습니다.</p></div><div></div></section></div></main>
<script src="../app.js?v=20260601a" defer></script><script>document.addEventListener("DOMContentLoaded", () => {
document.getElementById("head").innerHTML = header("브랜드 매거진");
loadData().then(d => {
  window.brandAtlasData = d;
  const params = new URLSearchParams(location.search);
  const slug = params.get("brand") || d.featuredBrand.slug;
  const brand = findBrand(d, slug);
  if (!brand) {
    document.title = "브랜드를 찾을 수 없습니다 | 브랜드 아틀라스";
    document.getElementById("brandPage").innerHTML = renderBrandNotFound(slug, d.allBrands || d.brands || []);
    return;
  }
  applyBrandSeo(brand);
  document.getElementById("brandPage").innerHTML = renderBrandMagazine(brand);
  enhanceImages(document);
});
});</script></body></html>
