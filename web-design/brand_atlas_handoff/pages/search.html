<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>브랜드 검색 | 브랜드 아틀라스</title><meta name="description" content="브랜드명, 산업, 관점 키워드로 브랜드 사전 항목을 검색합니다."><meta name="robots" content="index,follow"><meta property="og:type" content="website"><meta property="og:title" content="브랜드 검색 | 브랜드 아틀라스"><meta property="og:description" content="브랜드명, 산업, 관점 키워드로 브랜드 사전 항목을 검색합니다."><meta property="og:url" content="https://brand.resort.co.kr/pages/search.html"><meta property="og:image" content="https://brand.resort.co.kr/assets/objects/search_result_panel.png"><meta name="twitter:card" content="summary_large_image"><link rel="icon" href="../assets/objects/brand_atlas_logo_mark.png"><link rel="canonical" href="https://brand.resort.co.kr/pages/search.html"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css?v=20260531d"></head>
<body><a href="#main-content" class="skip-nav">본문 바로가기</a><div id="head"></div><main id="main-content" class="wrap"><section class="page-title"><div><p class="kicker">BRAND SEARCH</p><h1>브랜드 검색</h1><p class="lead">브랜드명, 산업, 제품, 인물, 관점 키워드로 983개 브랜드 사전 항목을 탐색합니다.</p><div class="search"><input id="query" type="search" aria-label="브랜드 검색어" placeholder="예: 디자인, 공간, 스타벅스, 모빌리티"><button aria-label="검색">⌕</button></div></div></section><section class="section-grid"><div class="panel"><h2>검색 결과</h2><div class="result-list" id="results"></div></div><aside class="panel"><h2>인기 검색어</h2><div class="chips" id="keywordLinks"></div></aside></section></main><script src="../app.js?v=20260531c" defer></script><script>document.addEventListener("DOMContentLoaded", () => {
document.getElementById("head").innerHTML = header("검색");
loadData().then(d => {
  const allBrands = d.allBrands || d.brands;
  const input = document.getElementById("query");
  const params = new URLSearchParams(location.search);
  const renderResults = q => {
    const query = (q || "").trim();
    if (query) history.replaceState(null, "", `search.html?q=${encodeURIComponent(query)}`);
    const rows = searchBrands(allBrands, query, 24);
    document.getElementById("results").innerHTML = rows.map(b => `<a class="result-item" href="brand-artemio.html?brand=${encodeURIComponent(b.slug)}"><img src="${asset(b.image)}" alt="${b.name} 브랜드 이미지" loading="lazy" decoding="async"><div><b>${b.name}</b><p>${b.industry} · ${tierLabel(b.tier)}</p><small>${short(b.definition, 140)}</small></div></a>`).join("") || `<p class="empty-note">검색 결과가 없습니다.</p>`;
    enhanceImages(document);
  };
  document.getElementById("keywordLinks").innerHTML = d.keywords.map(k => `<a class="chip tag-chip" href="search.html?q=${encodeURIComponent(k)}">${k}</a>`).join("");
  input.value = params.get("q") || "";
  renderResults(input.value);
  input.addEventListener("input", e => renderResults(e.target.value));
  document.querySelector(".search button").addEventListener("click", () => renderResults(input.value));
});
});</script></body></html>
