<body><a href="#main-content" class="skip-nav">본문 바로가기</a><div id="head"></div>
<main id="main-content" class="wrap">
<section class="hero home-hero">
  <div><p class="kicker">BRAND ENCYCLOPEDIA + MAGAZINE</p><h1>브랜드의 역사와<br><span class="red">아이덴티티를 기록하고 연결하다</span></h1>
  <p class="lead" id="siteDesc"></p>
  <div class="search"><input id="homeSearch" type="search" aria-label="브랜드 검색" placeholder="브랜드, 산업, 제품, 관점 키워드로 검색하세요"><button aria-label="검색">⌕</button></div>
  <div class="chips" id="keywords"></div></div>
  <div class="hero-board">
    <img class="map" src="assets/objects/world_map_dots.png" alt="브랜드 아틀라스 세계 지도" decoding="async">
    <div class="hero-board-grid">
      <a href="pages/industry.html"><b id="heroBrandCount">0</b><span>브랜드 항목</span></a>
      <a href="pages/industry.html"><b id="heroIndustryCount">0</b><span>산업 도메인</span></a>
      <a href="pages/timeline.html"><b id="heroTimelineCount">0</b><span>연표 노드</span></a>
      <a href="pages/bici.html"><b id="heroAssetCount">0</b><span>시각 자료</span></a>
    </div>
  </div>
</section>
<section class="feature-band">
  <div class="stat"><p>전체 브랜드</p><strong id="brandCount">0</strong><p>매거진 후보</p><strong id="magCount" style="font-size:34px">0</strong><p>마지막 업데이트 <span id="updatedAt"></span></p></div>
  <div class="darkcard" id="featuredCopy"></div>
  <img class="photo" id="featuredImage" src="assets/objects/hero_interior_lamp.jpg" alt="오늘의 브랜드 이미지" decoding="async">
</section>
<section class="dictionary-hub">
  <div class="hub-head">
    <p class="kicker">DICTIONARY DIRECTORY</p>
    <h2>산업, 개념, 관계로 다시 찾는 브랜드 사전</h2>
  </div>
  <div class="home-domain-grid" id="homeDomains"></div>
</section>
<section class="home-link-grid">
  <article class="panel home-paths">
    <h2>연결 큐레이션</h2>
    <div id="homePaths"></div>
  </article>
  <article class="panel home-index">
    <h2>가나다 · ABC 인덱스</h2>
    <div id="homeAlphabet"></div>
  </article>
</section>
<section class="card-row" id="brandCards"></section>
<section class="section-grid">
  <div class="panel"><h2>브랜드 인사이트</h2><div class="insight-list" id="insights"></div></div>
  <div class="panel"><h2>타임라인 미리보기</h2><div class="timeline" id="timeline"></div></div>
</section>
<footer class="footer"><span>브랜드는 시대를 기록하고, 문화를 만들며, 미래를 설계합니다.</span><span>브랜드 사전 · 산업별 탐색 · BI/CI · 관리자</span></footer>
</main><script src="app.js?v=20260531c" defer></script><script>document.addEventListener("DOMContentLoaded", () => {
document.getElementById("head").innerHTML = header("");
loadData().then(d => {
  window.brandAtlasData = d;
  document.getElementById("siteDesc").textContent = d.site.description;
  document.getElementById("keywords").innerHTML = "<b>인기 검색어</b>" + d.keywords.map(k => `<a class="chip tag-chip" href="pages/search.html?q=${encodeURIComponent(k)}">${k}</a>`).join("");
  document.getElementById("brandCount").textContent = fmt(d.stats.brands);
  document.getElementById("magCount").textContent = fmt((d.brands || []).filter(b => hasRealVisuals(b) && hasMagazineBody(b) && !isThinOrGeneric(b)).length);
  document.getElementById("updatedAt").textContent = d.site.updatedAt;
  document.getElementById("heroBrandCount").textContent = fmt(d.stats.brands);
  document.getElementById("heroIndustryCount").textContent = fmt(d.industries.length);
  document.getElementById("heroTimelineCount").textContent = fmt((d.timeline || []).length + (d.allBrands || []).reduce((sum, b) => sum + (b.timeline || []).length, 0));
  document.getElementById("heroAssetCount").textContent = fmt(d.stats.images);
  const daily = dailyHomeSelection(d);
  const f = daily.featured;
  document.getElementById("featuredCopy").innerHTML = `<small>오늘의 브랜드 · ${daily.dateKey}</small><h2>${f.name}</h2><p>${teaserText(f.sections?.insights?.body || f.insight || f.summary || f.definition, 210)}</p><p><span class="chip">${f.industry}</span> <span class="chip">${tierLabel(f.tier)}</span></p><p><a class="chip" href="pages/brand-artemio.html?brand=${encodeURIComponent(f.slug)}">매거진 읽기</a> <a class="chip" href="${daily.previewHref}">다른 조합 보기</a></p>`;
  document.getElementById("featuredImage").src = asset(f.image);
  document.getElementById("homeDomains").innerHTML = homeDomainCards(d);
  document.getElementById("homePaths").innerHTML = homePathCards(d, daily);
  document.getElementById("homeAlphabet").innerHTML = homeAlphabetIndex(d);
  document.getElementById("brandCards").innerHTML = daily.cards.map(brandCard).join("") + '<a class="arrow-cell" href="pages/industry.html">전체 브랜드 둘러보기 →</a>';
  document.getElementById("insights").innerHTML = daily.insights.map(insightCard).join("");
  document.getElementById("timeline").innerHTML = timelineRail(d.timeline.slice(0,8));
  enableTimelineAutoFlow(document.getElementById("timeline"));
  enhanceImages(document);
  document.getElementById("homeSearch").addEventListener("keydown", e => {
    if (e.key === "Enter" && e.target.value.trim()) location.href = `pages/search.html?q=${encodeURIComponent(e.target.value.trim())}`;
  });
  document.querySelector(".hero .search button").addEventListener("click", () => {
    const q = document.getElementById("homeSearch").value.trim();
    if (q) location.href = `pages/search.html?q=${encodeURIComponent(q)}`;
  });
});
});</script></body></html>
