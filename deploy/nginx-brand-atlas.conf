# Brand Atlas — static site for brand.resort.co.kr
# Place at: /etc/nginx/sites-available/brand-atlas.conf
#   sudo ln -s /etc/nginx/sites-available/brand-atlas.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# TLS is provisioned separately with: sudo certbot --nginx -d brand.resort.co.kr

server {
    listen 80;
    listen [::]:80;
    server_name brand.resort.co.kr;

    # Document root holds the contents of web-design/brand_atlas_handoff/
    root /var/www/brand-atlas;
    index index.html;

    # --- gzip (the 8MB+ JSON and JS/CSS compress very well) ---
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json;
    gzip_vary on;

    charset utf-8;

    # --- routing: static files, SPA-ish query-string pages resolve to real .html ---
    location / {
        try_files $uri $uri/ =404;
    }

    # --- caching policy ---
    # HTML: always revalidate so content/data updates are picked up immediately.
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # The data file is versioned via ?v= query in app.js; keep it revalidated.
    location = /data/brand-atlas.json {
        add_header Cache-Control "no-cache";
    }

    # Fingerprint-free static assets: cache for a year. app.js/styles.css are
    # already cache-busted with ?v= query strings on each release.
    location ~* \.(?:js|css|png|jpe?g|gif|webp|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- hardening ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Never expose dev-only artifacts even if accidentally synced.
    location ~ /\.(git|playwright) { deny all; }
    location ~* /(scripts|source-imports|reports|archive)/ { deny all; }

    error_page 404 /index.html;
}
